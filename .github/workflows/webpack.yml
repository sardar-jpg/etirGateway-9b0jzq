name: Expo Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}

    - name: Cache node_modules
      uses: actions/cache@v4
      id: npm-cache
      with:
        path: node_modules
        key: npm-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('package.json') }}
        restore-keys: |
          npm-${{ runner.os }}-${{ matrix.node-version }}-

    - name: Cache Expo CLI & Metro bundler
      uses: actions/cache@v4
      with:
        path: ~/.expo
        key: expo-${{ runner.os }}-${{ hashFiles('package.json') }}
        restore-keys: |
          expo-${{ runner.os }}-

    - name: Install dependencies
      if: steps.npm-cache.outputs.cache-hit != 'true'
      run: npm install --legacy-peer-deps

    - name: Install missing type definitions
      run: npm install --no-save --legacy-peer-deps @types/jest jest-expo

    - name: Run linter
      run: npm run --if-present lint
      continue-on-error: true

    - name: TypeScript type check
      run: npx tsc --noEmit

    - name: Run Jest tests
      run: npm test -- --ci --watchAll=false --passWithNoTests
